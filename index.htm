<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kuda Pizza - Fast Food Order</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>

    <header>
        <div class="header-content">
            <h1>🍔 Fast Food</h1>
            <div class="cart-box">
                <span id="total">0 ₽</span>
                <button class="btn-cart">Savat</button>
            </div>
        </div>
    </header>

    <main>
        <div class="search-container">
            <input id="searchInput" type="text" placeholder="Mahsulotlarni qidirish...">
        </div>

        <section>
            <h2 class="section-title">Суши</h2>
            <div id="sushi" class="grid-container"></div>
        </section>

        <section>
            <h2 class="section-title">Закуски</h2>
            <div id="section_theare" class="grid-container"></div>
        </section>

        <section>
            <h2 class="section-title">Десерты</h2>
            <div id="desserts" class="grid-container"></div>
        </section>
    </main>

    <script src="./main.js"></script>
</body>
</html>
